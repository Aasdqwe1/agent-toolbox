<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>MCP 工具箱</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f4f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 12px;
            min-height: 100vh;
            color: #1e293b;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 1200px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.05);
            padding: 18px 20px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e9edf2;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .title small {
            font-size: 14px;
            font-weight: 400;
            color: #6b7a8f;
            margin-left: 4px;
        }

        .status-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            background: #eef2f6;
            color: #3d4e62;
            border: 1px solid #dce1e8;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .status-badge.connected {
            background: #e3f5ec;
            border-color: #a8d5c0;
            color: #0e6b4c;
        }
        .status-badge.disconnected {
            background: #fee9e7;
            border-color: #fbcbc4;
            color: #b33a34;
        }
        .status-badge.thinking {
            background: #fff3d9;
            border-color: #f7dba0;
            color: #926d1f;
        }

        /* ===== 连接栏 ===== */
        .connect-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            padding: 10px 16px;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
        }
        .connect-bar label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
        }
        .connect-bar input {
            flex: 1;
            min-width: 150px;
            padding: 8px 14px;
            border: 1px solid #d1d9e6;
            border-radius: 40px;
            font-size: 14px;
            background: white;
            color: #1e293b;
            transition: 0.2s;
            font-family: inherit;
        }
        .connect-bar input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f4f9;
            color: #1e293b;
            border: 1px solid #d1d9e6;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
        }
        .btn-primary:hover {
            background: #0f1a2e;
        }
        .btn-secondary {
            background: white;
            border-color: #d1d9e6;
        }
        .btn-secondary:hover {
            background: #f1f4f9;
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 12px;
        }
        .btn-ghost {
            background: transparent;
            border-color: transparent;
            color: #3d4e62;
        }
        .btn-ghost:hover {
            background: #eef2f6;
        }

        /* ===== 主区域 ===== */
        .dashboard {
            display: flex;
            flex-direction: row;
            gap: 16px;
            align-items: stretch;
            min-height: 520px;
        }

        /* ---- 侧边栏 ---- */
        .sidebar {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }

        .panel {
            background: #fafcff;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            padding: 10px 16px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 500;
            font-size: 14px;
            color: #1e293b;
            flex-shrink: 0;
        }
        .panel-header .count {
            background: #eef2f6;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 12px;
            color: #475569;
        }
        .panel-body {
            padding: 12px 14px;
            overflow-y: auto;
            flex: 1;
        }

        /* ---- 会话列表 ---- */
        .session-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .session-item {
            background: white;
            border: 1px solid #e9edf2;
            border-radius: 14px;
            padding: 10px 14px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }
        .session-item:active {
            background: #f1f5f9;
        }
        .session-item.active {
            border-color: #3b82f6;
            background: #f0f7ff;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.08);
        }
        .session-item .s-name {
            font-weight: 600;
            font-size: 14px;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .session-item .s-name .badge-current {
            font-size: 10px;
            background: #3b82f6;
            color: white;
            border-radius: 40px;
            padding: 1px 8px;
            font-weight: 500;
        }
        .session-item .s-group {
            font-size: 12px;
            color: #6b7a8f;
            margin-top: 2px;
        }

        /* ---- 工具列表 ---- */
        .tools-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .tool-item {
            background: white;
            border: 1px solid #e9edf2;
            border-radius: 14px;
            padding: 10px 14px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }
        .tool-item:active {
            background: #f1f5f9;
            border-color: #b9c4d4;
        }
        .tool-item .tool-name {
            font-weight: 600;
            font-size: 14px;
            color: #0b1e33;
            font-family: ui-monospace, SFMono-Regular, monospace;
        }
        .tool-item .tool-desc {
            font-size: 13px;
            color: #4b5b6e;
            margin-top: 2px;
            line-height: 1.4;
        }

        /* ---- 快捷帮助 ---- */
        .help-box {
            font-size: 13px;
            color: #2d3a4c;
            line-height: 1.6;
        }
        .help-box code {
            background: #eef2f6;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
            color: #1e293b;
            font-family: ui-monospace, monospace;
        }
        .help-box ul {
            margin: 4px 0 4px 18px;
        }
        .help-box li {
            margin-bottom: 2px;
        }

        /* ---- 聊天区域 ---- */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 420px;
        }
        .chat-panel .panel-body {
            flex: 1;
            max-height: 440px;
            overflow-y: auto;
            padding: 16px 16px 12px;
            background: #fafcff;
        }

        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            background: #eef2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            color: #1e293b;
            font-weight: 500;
        }
        .message.user .message-avatar {
            background: #1e293b;
            color: white;
        }
        .message.system .message-avatar {
            background: #eef2f6;
            color: #6b7a8f;
        }
        .message-content {
            max-width: 82%;
        }
        .message.user .message-content {
            text-align: right;
        }
        .message-label {
            font-size: 11px;
            color: #6b7a8f;
            margin-bottom: 4px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .message-bubble {
            padding: 10px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            background: white;
            border: 1px solid #e9edf2;
            color: #1e293b;
            display: inline-block;
            text-align: left;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }
        .message.user .message-bubble {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.system .message-bubble {
            background: #f1f5f9;
            border: 1px dashed #d1d9e6;
            color: #3d4e62;
            font-size: 13px;
        }
        .message.server .message-bubble {
            background: white;
            border: 1px solid #e9edf2;
            border-bottom-left-radius: 4px;
        }
        .json-block {
            background: #f8fafc;
            padding: 10px 12px;
            border-radius: 12px;
            font-family: ui-monospace, monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid #e2e8f0;
            line-height: 1.5;
            color: #1e293b;
        }
        .method-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
            background: #eef2f6;
            color: #475569;
        }
        .method-request {
            background: #e2eaf5;
            color: #1a4b7a;
        }
        .method-response {
            background: #e2f0e8;
            color: #1a6b4a;
        }
        .method-error {
            background: #fde8e6;
            color: #b33a34;
        }
        .result-text {
            white-space: pre-wrap;
            font-family: ui-monospace, monospace;
            font-size: 13px;
        }
        .copy-btn {
            font-size: 11px;
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid #d1d9e6;
            background: white;
            cursor: pointer;
            transition: 0.1s;
            color: #1e293b;
        }
        .copy-btn:hover {
            background: #eef2f6;
        }

        /* ---- 快捷命令标签 ---- */
        .quick-commands {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px 14px;
            background: #fafcff;
            border-top: 1px solid #eef2f6;
            flex-shrink: 0;
        }
        .quick-cmd {
            padding: 4px 12px;
            background: white;
            border: 1px solid #dce1e8;
            border-radius: 30px;
            font-size: 12px;
            color: #2d3a4c;
            cursor: pointer;
            transition: 0.1s;
            font-family: ui-monospace, monospace;
        }
        .quick-cmd:active {
            background: #eef2f6;
        }

        /* ---- 输入区 ---- */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 10px 14px 14px;
            background: white;
            border-top: 1px solid #eef2f6;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d1d9e6;
            border-radius: 24px;
            font-size: 14px;
            background: #fafcff;
            color: #1e293b;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.5;
            transition: 0.15s;
        }
        .input-area textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }
        .input-area .send-btn {
            background: #1e293b;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 500;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            height: 44px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .input-area .send-btn:active {
            transform: scale(0.96);
        }
        .input-area .send-btn:disabled {
            background: #b9c4d4;
            cursor: not-allowed;
        }

        /* ---- 日志 ---- */
        .log-panel .panel-body {
            max-height: 80px;
            overflow-y: auto;
            padding: 6px 14px;
            background: #fafcff;
            font-size: 12px;
            font-family: ui-monospace, monospace;
            color: #3d4e62;
        }
        .log-item {
            padding: 3px 0;
            border-bottom: 1px solid #f1f4f9;
            display: flex;
            gap: 6px;
        }
        .log-item .time {
            color: #6b7a8f;
        }
        .log-item .type-request {
            color: #1a4b7a;
            font-weight: 500;
        }
        .log-item .type-response {
            color: #1a6b4a;
            font-weight: 500;
        }
        .log-item .type-error {
            color: #b33a34;
            font-weight: 500;
        }

        /* ===== 滚动条 ===== */
        .panel-body::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .panel-body::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .panel-body::-webkit-scrollbar-thumb {
            background: #d1d9e6;
            border-radius: 12px;
        }

        /* ===== 窄屏适配 ===== */
        @media (max-width: 820px) {
            .app {
                padding: 14px 12px 10px;
            }
            .dashboard {
                flex-direction: column;
                gap: 12px;
            }
            .sidebar {
                flex: 0 0 auto;
                width: 100%;
            }
            .chat-panel {
                min-height: 380px;
            }
            /* 会话列表与聊天区切换（移动端） */
            .sidebar.hidden-mobile {
                display: none;
            }
            .chat-panel.hidden-mobile {
                display: none;
            }
            .chat-panel .panel-header .back-btn {
                display: inline-flex !important;
            }
        }

        @media (min-width: 821px) {
            .chat-panel .panel-header .back-btn {
                display: none !important;
            }
            .sidebar.hidden-mobile {
                display: flex !important;
            }
            .chat-panel.hidden-mobile {
                display: flex !important;
            }
        }

        @media (max-width: 480px) {
            .connect-bar input {
                min-width: 100px;
            }
            .header .title {
                font-size: 18px;
            }
            .btn {
                padding: 6px 14px;
                font-size: 13px;
            }
            .message-content {
                max-width: 88%;
            }
            .chat-panel .panel-body {
                max-height: 340px;
            }
        }

        /* ===== 工具类 ===== */
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: #6b7a8f;
        }
        .mt-2 {
            margin-top: 8px;
        }
        .gap-1 {
            gap: 4px;
        }
        .flex {
            display: flex;
        }
        .flex-center {
            align-items: center;
            justify-content: center;
        }
        .w-full {
            width: 100%;
        }

        /* json 高亮辅助 */
        .json-key {
            color: #1a4b7a;
            font-weight: 500;
        }
        .json-string {
            color: #0e6b4c;
        }
        .json-number {
            color: #b45309;
        }
        .json-boolean {
            color: #6d28d9;
        }
        .json-null {
            color: #6b7a8f;
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- ===== 头部 ===== -->
        <div class="header">
            <div class="title">
                MCP 工具箱
                <small>交互终端</small>
            </div>
            <div class="status-group">
                <span id="mcpStatus" class="status-badge disconnected">未连接</span>
                <span id="deepseekStatus" class="status-badge disconnected">DeepSeek 未连接</span>
            </div>
        </div>

        <!-- ===== 连接栏 ===== -->
        <div class="connect-bar">
            <label>服务</label>
            <input type="text" id="serverUrl" placeholder="http://192.168.1.100:8080" value="http://192.168.1.100:8080" />
            <button class="btn btn-primary" onclick="connectMcp()">连接</button>
            <button class="btn btn-secondary" onclick="clearChat()">清空</button>
        </div>

        <!-- ===== 主区域 ===== -->
        <div class="dashboard" id="dashboard">
            <!-- 侧边栏 -->
            <div class="sidebar" id="sidebar">
                <!-- 会话列表 -->
                <div class="panel">
                    <div class="panel-header">
                        会话列表
                        <button class="btn btn-secondary btn-sm" onclick="newDeepSeekSession()">+ 新建</button>
                    </div>
                    <div class="panel-body" id="sessionsPanel" style="max-height: 360px; overflow-y: auto;">
                        <div class="text-center text-muted" style="padding: 24px 0; font-size:13px;">加载中...</div>
                    </div>
                </div>

                <!-- 工具列表 -->
                <div class="panel">
                    <div class="panel-header">
                        工具列表
                        <span class="count" id="toolCount">0</span>
                    </div>
                    <div class="panel-body" id="toolsPanel">
                        <ul id="toolsList" class="tools-list">
                            <li class="text-center text-muted" style="padding: 16px 0; font-size:13px;">连接后自动加载</li>
                        </ul>
                    </div>
                </div>

                <!-- 快捷命令 -->
                <div class="panel">
                    <div class="panel-header">快捷命令</div>
                    <div class="panel-body" style="max-height: 140px;">
                        <div class="help-box">
                            <ul style="margin-top:0;">
                                <li><code>/list</code> 列出工具</li>
                                <li><code>/call 工具 参数</code> 调用</li>
                                <li><code>/calc 1+1</code> 计算</li>
                                <li><code>/get URL</code> GET请求</li>
                                <li><code>/read 路径</code> 读文件</li>
                                <li><code>/write 路径 内容</code> 写文件</li>
                                <li><code>/help</code> 帮助</li>
                            </ul>
                            <div style="font-size:12px; color:#6b7a8f; margin-top:4px;">也可直接输入 JSON-RPC</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 聊天区域 -->
            <div class="panel chat-panel" id="chatPanel">
                <div class="panel-header">
                    <span style="display:flex; align-items:center; gap:8px;">
                        <button class="btn btn-ghost btn-sm back-btn" onclick="showSessionList()" style="font-size:16px; padding:0 6px;">返回</button>
                        <span id="currentSessionTitle">当前会话</span>
                    </span>
                    <span id="sessionStatus" style="font-weight:400; font-size:13px; color:#6b7a8f;">就绪</span>
                </div>
                <div class="panel-body" id="chatMessages">
                    <div class="message system">
                        <div class="message-avatar">i</div>
                        <div class="message-content">
                            <div class="message-label">系统</div>
                            <div class="message-bubble">
                                输入消息发送给 DeepSeek，或输入 <code>/help</code> 查看命令。
                            </div>
                        </div>
                    </div>
                </div>

                <div class="quick-commands">
                    <span class="quick-cmd" onclick="quickCommand('/list')">/list</span>
                    <span class="quick-cmd" onclick="quickCommand('/calc 1+1')">/calc</span>
                    <span class="quick-cmd" onclick="quickCommand('/get https://example.com')">/get</span>
                    <span class="quick-cmd" onclick="quickCommand('/read test.txt')">/read</span>
                    <span class="quick-cmd" onclick="quickCommand('/help')">/help</span>
                </div>

                <div class="input-area">
                    <textarea id="chatInput" placeholder="输入消息…" rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>

        <!-- ===== 日志 ===== -->
        <div class="panel log-panel">
            <div class="panel-header" style="font-size:13px; padding:6px 16px;">
                传输日志
                <button class="btn btn-secondary btn-sm" onclick="clearLog()">清空</button>
            </div>
            <div class="panel-body" id="logContent">
                <div style="color:#6b7a8f;">等待连接…</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  全局状态
        // ============================================================
        let tools = [];
        let requestId = 0;
        let isProcessing = false;
        let deepseekConnected = false;
        let currentSessionId = null;
        let currentSessionTitle = '未命名';

        // ============================================================
        //  DOM 引用
        // ============================================================

        //  辅助
        // ============================================================
        function getServerUrl() { return serverUrlInput.value.trim(); }

        function setMcpStatus(connected, text) {
            mcpStatus.className = 'status-badge ' + (connected ? 'connected' : 'disconnected');
            mcpStatus.textContent = text;
        }

        function setDeepSeekStatus(connected, text) {
            deepseekStatus.className = 'status-badge ' + (connected ? 'connected' : 'disconnected');
            deepseekStatus.textContent = text;
        }

        function setSessionStatus(text) {
            sessionStatus.textContent = text;
        }

        function setCurrentSessionTitle(title) {
            currentSessionTitle = title || '未命名';
            currentSessionTitleEl.textContent = '' + currentSessionTitle;
        }

        function addLog(type, message) {
            const time = new Date().toLocaleTimeString();
            const item = document.createElement('div');
            item.className = 'log-item';
            const typeMap = { request: 'type-request', response: 'type-response', error: 'type-error' };
            const label = typeMap[type] || '';
            item.innerHTML = `<span class="time">[${time}]</span><span class="${label}">${type.toUpperCase()}</span> ${escapeHtml(message)}`;
            if (logContent.querySelector('div')?.style?.color === 'rgb(107, 122, 143)') logContent.innerHTML = '';
            logContent.insertBefore(item, logContent.firstChild);
        }

        function clearLog() {
            logContent.innerHTML = '<div style="color:#6b7a8f;">等待连接…</div>';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function syntaxHighlight(json) {
            if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
            return json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                    function(m) {
                        let cls = 'json-number';
                        if (/^"/.test(m)) { cls = /:$/.test(m) ? 'json-key' : 'json-string'; } else if (/true|false/
                            .test(m)) cls = 'json-boolean';
                        else if (/null/.test(m)) cls = 'json-null';
                        return '<span class="' + cls + '">' + m + '</span>';
                    });
        }

        // ============================================================
        //  消息渲染
        // ============================================================
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML =
                `<div class="message-avatar">i</div><div class="message-content"><div class="message-label">系统</div><div class="message-bubble">${text}</div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML =
                `<div class="message-avatar">U</div><div class="message-content"><div class="message-label">你</div><div class="message-bubble" style="white-space:pre-wrap;">${escapeHtml(text)}</div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addRequestMessage(method, data) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML =
                `<div class="message-avatar">➜</div><div class="message-content"><div class="message-label"><span class="method-badge method-request">请求</span> ${method}</div><div class="message-bubble"><div class="json-block">${syntaxHighlight(data)}</div></div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addResponseMessage(data) {
            const div = document.createElement('div');
            div.className = 'message server';
            const isError = data.error !== undefined;
            const badge = isError ? 'method-error' : 'method-response';
            const label = isError ? '错误' : '响应';
            div.innerHTML =
                `<div class="message-avatar">⬅</div><div class="message-content"><div class="message-label"><span class="method-badge ${badge}">${label}</span> jsonrpc</div><div class="message-bubble"><div class="json-block">${syntaxHighlight(data)}</div></div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addResultCard(toolName, resultText) {
            const div = document.createElement('div');
            div.className = 'message server';
            div.innerHTML = `
                <div class="message-avatar">📋</div>
                <div class="message-content">
                    <div class="message-label">

                        <button class="copy-btn" onclick="copyResult(this)" style="float:right;">复制</button>
                    </div>

                        <div class="result-text">${escapeHtml(resultText)}</div>
                    </div>
                </div>

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function copyResult(btn) {
            const resultText = btn.closest('.message-content').querySelector('.result-text').textContent;
            navigator.clipboard.writeText(resultText).then(() => {
                const orig = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.style.background = '#e3f5ec';
                btn.style.borderColor = '#a8d5c0';
                btn.style.color = '#0e6b4c';
                setTimeout(() => { btn.textContent = orig;
                    btn.style.background = 'white';
                    btn.style.borderColor = '#d1d9e6';
                    btn.style.color = 'inherit'; }, 1500);
            }).catch(() => {
                btn.textContent = '失败';
                setTimeout(() => btn.textContent = '复制', 1500);
            });

        function clearChat() {
            chatMessages.innerHTML =
                `<div class="message system"><div class="message-avatar">i</div><div class="message-content"><div class="message-label">系统</div><div class="message-bubble">会话已清空</div></div></div>`;

        // ============================================================
        //  工具列表
        // ============================================================
        function renderToolsList() {
            toolsList.innerHTML = '';
            if (!tools.length) {
                toolsList.innerHTML =
                    '<li class="text-center text-muted" style="padding:12px 0; font-size:13px;">暂无工具</li>';
                return;
            }
            tools.forEach(t => {

        // ============================================================
        //  MCP 请求
        // ============================================================
        async function sendMcpRequest(method, params) {
            const url = getServerUrl();
            const id = 'req_' + (++requestId);
            const request = { jsonrpc: '2.0', id, method, params: params || {} };
            addLog('request', `${method} (id:${id})`);
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request)
            });
            const data = await res.json();
            addLog('response', `${method} 完成`);
            return { request, response: data };
        }

        // ============================================================
        //  连接 MCP
        // ============================================================
        async function connectMcp() {
            if (isProcessing) return;
            try {
                setMcpStatus(false, '连接中…');
                setSessionStatus('握手…');
                addLog('request', '建立 MCP 连接');

                const init = await sendMcpRequest('initialize', {
                    protocolVersion: '2024-11-05',
                    capabilities: { tools: {} },
                    clientInfo: { name: 'Web Terminal', version: '2.0' }
                });
                addRequestMessage('initialize', init.request);
                addResponseMessage(init.response);

                await sendMcpRequest('notifications/initialized', {});

                const toolsRes = await sendMcpRequest('tools/list', {});
                addRequestMessage('tools/list', toolsRes.request);
                addResponseMessage(toolsRes.response);

                if (toolsRes.response.result && toolsRes.response.result.tools) {
                    tools = toolsRes.response.result.tools;
                    renderToolsList();
                    toolCount.textContent = tools.length;
                    setMcpStatus(true, '已连接');
                    setSessionStatus('就绪');
                    addSystemMessage(`连接成功，加载 ${tools.length} 个工具。输入 /list 查看。`);
                } else {
                    setMcpStatus(false, '工具获取失败');
                    setSessionStatus('失败');
                }
            } catch (e) {
                setMcpStatus(false, '连接失败');
                setSessionStatus('失败');
                addLog('error', '连接失败: ' + e.message);
                addSystemMessage('连接失败: ' + e.message);
            }
        }

        // ============================================================
        //  命令处理
        // ============================================================
        async function handleCommand(text) {
            const parts = text.match(/^\/(\w+)\s*(.*)?/);
            if (!parts) { addSystemMessage('无效命令，输入 /help'); return; }
            const cmd = parts[1].toLowerCase();
            const args = parts[2] || '';
            addUserMessage(text);

            isProcessing = true;
            sendBtn.disabled = true;
            setSessionStatus('处理中…');

            try {
                switch (cmd) {
                    case 'list':
                    case 'tools': {
                        const r = await sendMcpRequest('tools/list', {});
                        addRequestMessage('tools/list', r.request);
                        addResponseMessage(r.response);
                        break;
                    }
                    case 'call': {
                        const m = args.match(/^(\w+)\s*(\{.*\})?/);
                        if (!m) throw new Error('用法: /call 工具名 {"参数":"值"}');
                        const toolName = m[1];
                        let arguments = {};
                        if (m[2]) try { arguments = JSON.parse(m[2]); } catch (e) { throw new Error('参数JSON格式错误'); }
                        const req = { jsonrpc: '2.0', id: 'call_' + Date.now(), method: 'tools/call', params: { name: toolName,
                                arguments } };
                        addRequestMessage('tools/call', req);
                        const res = await fetch(getServerUrl(), { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(req) });
                        const data = await res.json();
                        addResponseMessage(data);
                        break;
                    }
                    case 'calc': {
                        if (!args) throw new Error('用法: /calc 表达式');
                        const req = { jsonrpc: '2.0', id: 'calc_' + Date.now(), method: 'tools/call', params: { name: 'math_calculator',
                                arguments: { expression: args } } };
                        addRequestMessage('tools/call (math)', req);
                        const res = await fetch(getServerUrl(), { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(req) });
                        const data = await res.json();
                        addResponseMessage(data);
                        break;
                    }
                    case 'get': {
                        if (!args) throw new Error('用法: /get URL');
                        const req = { jsonrpc: '2.0', id: 'get_' + Date.now(), method: 'tools/call', params: { name: 'http_request',
                                arguments: { method: 'GET', url: args } } };
                        addRequestMessage('tools/call (http)', req);
                        const res = await fetch(getServerUrl(), { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(req) });
                        const data = await res.json();
                        addResponseMessage(data);
                        break;
                    }
                    case 'read': {
                        if (!args) throw new Error('用法: /read 路径');
                        const req = { jsonrpc: '2.0', id: 'read_' + Date.now(), method: 'tools/call', params: { name: 'file_read',
                                arguments: { path: args } } };
                        addRequestMessage('tools/call (file_read)', req);
                        const res = await fetch(getServerUrl(), { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(req) });
                        const data = await res.json();
                        addResponseMessage(data);
                        break;
                    }
                    case 'write': {
                        const m = args.match(/^(\S+)\s+(.*)/);
                        if (!m) throw new Error('用法: /write 路径 内容');
                        const req = { jsonrpc: '2.0', id: 'write_' + Date.now(), method: 'tools/call', params: { name: 'file_write',
                                arguments: { path: m[1], content: m[2] } } };
                        addRequestMessage('tools/call (file_write)', req);
                        const res = await fetch(getServerUrl(), { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(req) });
                        const data = await res.json();
                        addResponseMessage(data);
                        break;
                    }
                    case 'help': {
                        const helpText = `
                            <strong>命令</strong><br>
                            <code>/list</code> 列出工具<br>
                            <code>/call 工具 {"k":"v"}</code> 调用<br>
                            <code>/calc 1+1</code> 计算<br>
                            <code>/get URL</code> GET请求<br>
                            <code>/read 路径</code> 读文件<br>
                            <code>/write 路径 内容</code> 写文件<br>
                            <code>/help</code> 此帮助<br>
                            也可直接输入 JSON-RPC 请求
                        `;
                        addSystemMessage(helpText);
                        break;
                    }
                    case 'clear': {
                        clearChat();
                        break;
                    }
                    default:
                        addSystemMessage('未知命令: /' + cmd + ' 输入 /help');
                }
            } catch (e) {
                addLog('error', e.message);
                addSystemMessage('错误: ' + e.message);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                setSessionStatus('就绪');
            }
        }

        // ============================================================
        //  原始 JSON
        // ============================================================
        async function handleRawJson(text) {
            addUserMessage(text);
            isProcessing = true;
            sendBtn.disabled = true;
            setSessionStatus('发送…');
            try {
                const req = JSON.parse(text);
                if (!req.jsonrpc || !req.method) throw new Error('缺少 jsonrpc 或 method');
                addRequestMessage(req.method, req);
                const res = await fetch(getServerUrl(), { method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(req) });
                const data = await res.json();
                addResponseMessage(data);
                addLog('response', req.method + ' 完成');
            } catch (e) {
                addLog('error', e.message);
                addResponseMessage({ jsonrpc: '2.0', id: null, error: { code: -32700, message: '解析错误: ' + e.message } });
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                setSessionStatus('就绪');
            }
        }

        // ============================================================
        //  智能解析工具调用
        // ============================================================
        function extractJsonFromText(text) {
            try { return JSON.parse(text); } catch (e) {}
            const block = text.match(/```(?:json)?\s*([\s\S]*?)```/i);
            if (block) try { return JSON.parse(block[1].trim()); } catch (e) {}
            const firstBrace = text.indexOf('{');
            const lastBrace = text.lastIndexOf('}');
            if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
                try { return JSON.parse(text.substring(firstBrace, lastBrace + 1)); } catch (e) {}
            }
            const firstBracket = text.indexOf('[');
            const lastBracket = text.lastIndexOf(']');
            if (firstBracket !== -1 && lastBracket !== -1 && lastBracket > firstBracket) {
                try { return JSON.parse(text.substring(firstBracket, lastBracket + 1)); } catch (e) {}
            }
            return null;
        }

        function parseToolCall(obj) {
            if (!obj || typeof obj !== 'object') return null;
            if (obj.jsonrpc && obj.method === 'tools/call' && obj.params) {
                return { name: obj.params.name, arguments: obj.params.arguments || {} };
            }
            if (obj.name && typeof obj.name === 'string') {
                return { name: obj.name, arguments: obj.arguments || obj.parameters || obj.args || {} };
            }
            if (obj.tool && typeof obj.tool === 'string') {
                return { name: obj.tool, arguments: obj.args || obj.arguments || obj.parameters || {} };
            }
            if (obj.tool_name && typeof obj.tool_name === 'string') {
                return { name: obj.tool_name, arguments: obj.params || obj.arguments || obj.args || {} };
            }
            return null;
        }

        function extractToolResult(data) {
            if (data.result && data.result.content && Array.isArray(data.result.content)) {
                return data.result.content.map(item => item.text || '').join('\n');
            }
            if (data.result) return JSON.stringify(data.result, null, 2);
            if (data.error) return '错误: ' + data.error.message;
            return JSON.stringify(data, null, 2);
        }

        // ============================================================
        //  主发送
        // ============================================================
        async function sendMessage() {
            if (isProcessing) { addLog('error', '正在处理…'); return; }
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';

            if (text.startsWith('/')) {
                await handleCommand(text);
            } else if (text.startsWith('{')) {
                await handleRawJson(text);
            } else {
                // DeepSeek 优先
                if (deepseekConnected) {
                    await sendToDeepSeek(text);
                    return;
                }

                addUserMessage(text);
                if (tools.length === 0) {
                    addSystemMessage('请先连接服务');
                    return;
                }

                isProcessing = true;
                sendBtn.disabled = true;
                setSessionStatus('解析中…');

                try {
                    let toolCall = null;
                    let parseMode = '';

                    const jsonObj = extractJsonFromText(text);
                    if (jsonObj) {
                        toolCall = parseToolCall(jsonObj);
                        if (toolCall) parseMode = '智能解析';
                    }

                    if (!toolCall) {
                        const lowerText = text.toLowerCase();
                        let matchedTool = null;
                        let toolArgs = {};

                        if (lowerText.includes('计算') || lowerText.includes('等于') || lowerText.includes('算一下') ||
                            lowerText.includes('多少') || /\d+[\+\-\*\/\(\)]/.test(text)) {
                            const expr = text.replace(/[^0-9+\-*/().\s]/g, '').trim();
                            if (expr && expr.length > 0) {
                                matchedTool = 'math_calculator';
                                toolArgs = { expression: expr };
                            }
                        }

                        if (!matchedTool) {
                            const urlMatch = text.match(/https?:\/\/[^\s]+/i);
                            if (urlMatch) {
                                const url = urlMatch[0];
                                let method = 'GET';
                                if (lowerText.includes('post') || lowerText.includes('提交') || lowerText.includes('发送'))
                                    method = 'POST';
                                else if (lowerText.includes('put') || lowerText.includes('更新')) method = 'PUT';
                                else if (lowerText.includes('delete') || lowerText.includes('删除')) method = 'DELETE';
                                matchedTool = 'http_request';
                                toolArgs = { method, url };
                            }
                        }

                        if (!matchedTool) {
                            const readMatch = text.match(/(?:读取|读|查看|打开)\s*(?:文件\s*)?([^\s，。！？]+)/i);
                            if (readMatch && (lowerText.includes('读取') || lowerText.includes('读文件') || lowerText.includes(
                                    '查看文件') || lowerText.includes('打开文件'))) {
                                matchedTool = 'file_read';
                                toolArgs = { path: readMatch[1] };
                            }
                        }

                        if (!matchedTool) {
                            const writeMatch = text.match(/(?:写入|写|保存)\s*(?:文件\s*)?([^\s，。！？]+)\s+(.+)/i);
                            if (writeMatch && (lowerText.includes('写入') || lowerText.includes('写文件') || lowerText.includes(
                                    '保存文件'))) {
                                matchedTool = 'file_write';
                                toolArgs = { path: writeMatch[1], content: writeMatch[2] };
                            }
                        }

                        if (matchedTool) {
                            toolCall = { name: matchedTool, arguments: toolArgs };
                            parseMode = '关键词匹配';
                        }
                    }

                    if (toolCall) {
                        const req = {
                            jsonrpc: '2.0',
                            id: 'auto_' + Date.now(),
                            method: 'tools/call',
                            params: { name: toolCall.name, arguments: toolCall.arguments }
                        };
                        addRequestMessage('tools/call (' + parseMode + ')', req);
                        setSessionStatus('执行中…');

                        const res = await fetch(getServerUrl(), { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(req) });
                        const data = await res.json();
                        addResponseMessage(data);
                        const resultText = extractToolResult(data);
                        if (resultText) addResultCard(toolCall.name, resultText);
                    } else {
                        addSystemMessage(`
                            我可以帮你做这些：<br><br>
                            <strong>智能解析工具调用</strong><br>
                            直接粘贴 DeepSeek 输出的工具调用 JSON，自动识别执行<br><br>
                            <strong>数学计算</strong><br>
                            例如：计算 1+2*3、123+456等于多少<br><br>
                            <strong>HTTP请求</strong><br>
                            例如：访问 https://example.com、GET https://api.example.com<br><br>
                            <strong>文件操作</strong><br>
                            例如：读取文件 test.txt、写入文件 test.txt 你好世界<br><br>
                            <em>也可以输入 /help 查看所有命令</em>
                        `);
                    }
                } catch (e) {
                    addSystemMessage('执行失败: ' + e.message);
                } finally {
                    isProcessing = false;
                    sendBtn.disabled = false;
                    setSessionStatus('就绪');
                }
            }
        }

        // ============================================================
        //  DeepSeek 功能
        // ============================================================
        async function checkDeepSeekStatus() {
            try {
                const url = getServerUrl();
                const res = await fetch(url + '/api/chat/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                const data = await res.json();
                if (data.success && data.connected) {
                    deepseekConnected = true;
                    setDeepSeekStatus(true, 'DeepSeek 已连接');
                    await loadDeepSeekSessions();

                    deepseekConnected = false;
                    setDeepSeekStatus(false, 'DeepSeek 未连接');

                }
            } catch (e) {
                deepseekConnected = false;
                setDeepSeekStatus(false, 'DeepSeek 未连接');
                sessionsPanel.innerHTML =
                    '<div class="text-center text-muted" style="padding:20px 0; font-size:13px;">请求失败: ' + escapeHtml(e
                    .message) + '</div>';
            }
        }

        async function loadDeepSeekSessions() {
            try {
                const url = getServerUrl();
                const res = await fetch(url + '/api/chat/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                const data = await res.json();

                let sessions = null;
                if (data && data.sessions && Array.isArray(data.sessions)) {
                    sessions = data.sessions;
                } else if (data && data.data && data.data.sessions && Array.isArray(data.data.sessions)) {
                    sessions = data.data.sessions;
                }

                if (sessions !== null) {
                    if (sessions.length === 0) {
                        sessionsPanel.innerHTML =
                            '<div class="text-center text-muted" style="padding:20px 0; font-size:13px;">暂无会话</div>';
                    } else {
                        let html = '<ul class="session-list">';
                        sessions.forEach(function(s) {
                            const isActive = s.isCurrent === true;
                            if (isActive) {
                                currentSessionId = s.id;
                                setCurrentSessionTitle(s.title || '未命名');
                            }
                            const activeClass = isActive ? 'active' : '';
                            const badge = isActive ? ' <span class="badge-current">当前</span>' : '';
                            html += `
                                <li class="session-item ${activeClass}" onclick="selectDeepSeekSession('${s.id}')">
                                    <div class="s-name">${escapeHtml(s.title || '未命名')}${badge}</div>
                                    ${s.group ? '<div class="s-group">' + escapeHtml(s.group) + '</div>' : ''}
                                </li>
                            `;
                        });
                        html += '</ul>';
                        sessionsPanel.innerHTML = html;
                    }
                } else {
                    sessionsPanel.innerHTML =
                        '<div class="text-center" style="color:#b33a34; padding:20px 0; font-size:13px;">' + (data.error ||
                            '加载失败') + '</div>';
                }
            } catch (e) {
                sessionsPanel.innerHTML =
                    '<div class="text-center" style="color:#b33a34; padding:20px 0; font-size:13px;">加载失败: ' + escapeHtml(e
                        .message) + '</div>';
            }
        }

        // 构建 MCP 工具初始化消息：告诉 LLM 当前有哪些工具、如何调用
        function buildMcpInitMessage() {
            if (!tools || tools.length === 0) {
                return '【环境初始化】\n' +
                    '当前尚未加载任何 MCP 工具。请先点击顶部的"连接"按钮。\n' +
                    '---\n' +
                    '当工具加载完成后，我会告知你可用工具及调用方式。';
            }

            let toolList = '';
            for (let i = 0; i < tools.length; i++) {
                const t = tools[i];
                let schemaStr = '';
                if (t.inputSchema && t.inputSchema.properties) {
                    const props = t.inputSchema.properties;
                    const keys = Object.keys(props);
                    for (let k = 0; k < keys.length; k++) {
                        const p = props[keys[k]];
                        const typeStr = p.type || 'any';
                        const required = t.inputSchema.required &&
                            Array.isArray(t.inputSchema.required) &&
                            t.inputSchema.required.indexOf(keys[k]) !== -1;
                        schemaStr += '        - ' + keys[k] +
                            ' (类型: ' + typeStr +
                            (required ? '，必填' : '') +
                            (p.description ? '，说明: ' + p.description : '') + ')\n';
                    }
                }
                toolList += '    ' + (i + 1) + '. **' + t.name + '**\n' +
                    '       - 描述: ' + (t.description || '(无描述)') + '\n' +
                    (schemaStr ? '       - 参数:\n' + schemaStr : '');
            }

            return '【环境初始化 · MCP 工具协议】\n' +
                '\n' +
                '你（LLM）正处于一个可调用 MCP 工具的智能会话环境。所有用户问题都应优先使用以下工具，而不是只靠自身知识回答。\n' +
                '\n' +
                '---\n' +
                '\n' +
                '**一、工具列表（共 ' + tools.length + ' 个）**\n' +
                toolList +
                '\n' +
                '**二、调用格式（严格按此 JSON-RPC 输出）**\n' +
                '当你判断需要使用工具时，请输出一个严格合法的 JSON（单独一行，不要包裹在代码块里，也不要有其它文字）：\n' +
                '\n' +
                '```\n' +
                '{"jsonrpc":"2.0","id":"req_" + 任意唯一ID,"method":"tools/call","params":{"name":"工具名","arguments":{...参数}}}\n' +
                '```\n' +
                '\n' +
                '示例（计算 123 + 456）：\n' +
                '```\n' +
                '{"jsonrpc":"2.0","id":"calc_1","method":"tools/call","params":{"name":"math_calculator","arguments":{"expression":"123 + 456"}}}\n' +
                '```\n' +
                '\n' +
                '**三、返回结果读取方式**\n' +
                '系统收到你的 JSON 后会以如下结构返回给你（作为用户下一条消息）：\n' +
                '- `result.content[].text`：工具执行的文本输出\n' +
                '- `result.isError`：是否失败\n' +
                '- 若出错会包含错误信息\n' +
                '\n' +
                '请基于返回结果继续回答用户的问题；若工具结果不足以得出结论，或需要多步调用，请继续输出下一个 JSON-RPC 调用。\n' +
                '\n' +
                '**四、交互流程**\n' +
                '1. 用户提问 → 你判断是否需要调用工具\n' +
                '2. 需要时，严格只输出一个 JSON-RPC 请求（可放在代码块中）\n' +
                '3. 系统执行工具并返回结果\n' +
                '4. 你基于工具结果继续推理或给出最终回答\n' +
                '5. 无需工具时直接回答用户\n' +
                '\n' +
                '**五、重要约束**\n' +
                '- 每次只调用一个工具\n' +
                '- 确保 JSON 完全合法，引号、括号匹配，字符串需双引号\n' +
                '- 使用的工具名必须严格与上方列表一致\n' +
                '- 参数必须与 inputSchema 的 properties 字段一一对应\n' +
                '\n' +
                '---\n' +
                '\n' +
                '如果你明白了，请回复"已接收工具协议，可以开始任务"。后续我会把用户的问题提供给你，请按协议执行。';
        }

        async function selectDeepSeekSession(sessionId) {
            try {
                const url = getServerUrl();
                const res = await fetch(url + '/api/chat/select', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });
                const data = await res.json();
                if (data.success) {
                    addSystemMessage('已切换会话');
                    await loadDeepSeekSessions();
                    // 移动端：切换到聊天视图
                    showChatView();
                    // 自动向 DeepSeek 发送 MCP 工具初始化消息，让 LLM 知晓工具环境
                    const initMsg = buildMcpInitMessage();
                    addLog('request', '自动发送 MCP 初始化消息 (切换会话)');
                    await sendToDeepSeek(initMsg);
                } else {
                    addSystemMessage('切换失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                addSystemMessage('切换失败: ' + e.message);
            }
        }

        async function newDeepSeekSession() {
            try {
                const url = getServerUrl();
                const res = await fetch(url + '/api/chat/new', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                const data = await res.json();
                if (data.success) {
                    addSystemMessage('已创建新会话');
                    await loadDeepSeekSessions();
                    showChatView();
                    // 自动向 DeepSeek 发送 MCP 工具初始化消息，让 LLM 知晓工具环境
                    const initMsg = buildMcpInitMessage();
                    addLog('request', '自动发送 MCP 初始化消息 (新建会话)');
                    await sendToDeepSeek(initMsg);
                } else {
                    addSystemMessage('创建失败: ' + (data.error || '未知错误'));
                }
            } catch (e) {
                addSystemMessage('创建失败: ' + e.message);
            }
        }

        async function sendToDeepSeek(text) {
            addUserMessage(text);
            setSessionStatus('连接中…');

            // 创建占位的 AI 消息条，用于流式增量渲染
            const bubbleEl = document.createElement('div');
            bubbleEl.className = 'message-bubble';
            bubbleEl.style.whiteSpace = 'pre-wrap';
            bubbleEl.textContent = '…';

            const labelEl = document.createElement('div');
            labelEl.className = 'message-label';
            labelEl.innerHTML = '<span class="method-badge method-response">DeepSeek</span> <span class="text-muted" style="font-size:12px; font-weight:400;" id="dsStreamState">流式</span>';

            const contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            contentEl.appendChild(labelEl);
            contentEl.appendChild(bubbleEl);

            const msgEl = document.createElement('div');
            msgEl.className = 'message server';
            msgEl.innerHTML = '<div class="message-avatar">AI</div>';
            msgEl.appendChild(contentEl);
            chatMessages.appendChild(msgEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const setState = (t) => {
                const s = document.getElementById('dsStreamState');
                if (s) s.textContent = t;
            };

            try {
                const url = getServerUrl();
                const res = await fetch(url + '/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const contentType = (res.headers.get('Content-Type') || '').toLowerCase();
                const isStream = contentType.includes('text/event-stream');

                if (!isStream) {
                    // 兼容非流式旧响应：直接 JSON
                    const data = await res.json();
                    if (data && (data.success !== false) && (data.reply || (data.data && data.data.reply))) {
                        const reply = data.reply || (data.data && data.data.reply) || '';
                        bubbleEl.textContent = reply;
                        setState('完成');
                    } else {
                        bubbleEl.textContent = '';
                        addSystemMessage('发送失败: ' + (data.error || '未知错误'));
                    }
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    return;
                }

                // ===== 流式 SSE 解析 =====
                setSessionStatus('生成中…');
                const reader = res.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';           // 剩余未解析原始字节
                let eventName = '';        // 当前事件名
                let dataLines = [];        // 当前事件的 data 行
                let lastLen = 0;
                let gotContent = false;
                let gotDone = false;

                const flushEvent = () => {
                    if (dataLines.length === 0) {
                        eventName = '';
                        return;
                    }
                    const payload = dataLines.join('\n');
                    dataLines = [];
                    let obj = null;
                    try { obj = JSON.parse(payload); } catch (e) { obj = null; }

                    if (eventName === 'started') {
                        setState('开始');
                    } else if (eventName === 'chunk') {
                        if (obj && typeof obj.content === 'string') {
                            // 服务端回传的 chunk 是当前全量文本，这里增量渲染
                            if (obj.content.length > lastLen) {
                                if (!gotContent) {
                                    bubbleEl.textContent = obj.content;
                                } else {
                                    bubbleEl.textContent = obj.content;
                                }
                                lastLen = obj.content.length;
                            }
                            gotContent = true;
                        }
                    } else if (eventName === 'done') {
                        gotDone = true;
                        if (obj && typeof obj.content === 'string') {
                            bubbleEl.textContent = obj.content;
                        }
                        setState('完成');
                    } else if (eventName === 'error') {
                        gotDone = true;
                        const errText = (obj && obj.error) ? obj.error : payload;
                        if (!gotContent) bubbleEl.textContent = '';
                        addSystemMessage('流式回复失败: ' + errText);
                        setState('错误');
                    }
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    eventName = '';
                };

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // 按行解析 SSE：以 \n\n 为一个事件边界
                    let idx;
                    while ((idx = buffer.indexOf('\n\n')) !== -1) {
                        const block = buffer.substring(0, idx);
                        buffer = buffer.substring(idx + 2);
                        const lines = block.split('\n');
                        for (let li = 0; li < lines.length; li++) {
                            const line = lines[li];
                            if (!line) continue;
                            if (line.charAt(0) === ':') continue; // 注释/心跳
                            const colon = line.indexOf(':');
                            if (colon === -1) {
                                // 没有冒号，忽略
                                continue;
                            }
                            const field = line.substring(0, colon).trim();
                            let val = line.substring(colon + 1);
                            if (val.charAt(0) === ' ') val = val.substring(1);
                            if (field === 'event') eventName = val;
                            else if (field === 'data') dataLines.push(val);
                            // id / retry 忽略
                        }
                        flushEvent();
                    }
                }
                // 处理末尾可能剩余不完整块
                if (buffer.length > 0) {
                    const lines = buffer.split('\n');
                    for (let li = 0; li < lines.length; li++) {
                        const line = lines[li];
                        if (!line) continue;
                        if (line.charAt(0) === ':') continue;
                        const colon = line.indexOf(':');
                        if (colon === -1) continue;
                        const field = line.substring(0, colon).trim();
                        let val = line.substring(colon + 1);
                        if (val.charAt(0) === ' ') val = val.substring(1);
                        if (field === 'event') eventName = val;
                        else if (field === 'data') dataLines.push(val);
                    }
                    flushEvent();
                }

                if (!gotDone) {
                    // 流被提前关闭但没收到 done
                    if (!gotContent) addSystemMessage('流异常结束，未收到完整回复');
                    setState('结束');
                }
            } catch (e) {
                if (bubbleEl.textContent === '…') bubbleEl.textContent = '';
                addSystemMessage('发送失败: ' + e.message);
                setState('失败');
            } finally {
                setSessionStatus('就绪');
            }
        }

        // ============================================================
        //  移动端视图切换
        // ============================================================
        function isMobile() {
            return window.innerWidth <= 820;
        }

        function showChatView() {
            if (!isMobile()) return;
            sidebar.classList.add('hidden-mobile');
            chatPanel.classList.remove('hidden-mobile');
        }

        function showSessionList() {
            if (!isMobile()) return;
            chatPanel.classList.add('hidden-mobile');
            sidebar.classList.remove('hidden-mobile');
        }

        // 窗口尺寸变化时自动调整
        window.addEventListener('resize', function() {
            if (!isMobile()) {
                sidebar.classList.remove('hidden-mobile');
                chatPanel.classList.remove('hidden-mobile');
            } else {
                // 默认显示会话列表
                if (!sidebar.classList.contains('hidden-mobile') && !chatPanel.classList.contains('hidden-mobile')) {
                    // 两个都显示时，默认显示会话列表
                    chatPanel.classList.add('hidden-mobile');
                }
            }
        });

        // ============================================================
        //  初始化
        // ============================================================
        window.onload = function() {
            // 默认移动端显示会话列表
            if (isMobile()) {
                chatPanel.classList.add('hidden-mobile');
                sidebar.classList.remove('hidden-mobile');
            }

            if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                serverUrlInput.value = window.location.protocol + '//' + window.location.host;
                setTimeout(connectMcp, 400);
                setTimeout(checkDeepSeekStatus, 800);
            }
            addLog('request', '终端已就绪');
        };
    </script>
